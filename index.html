<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    body {
      background-color: #D5E1EF;
    }

    @media (min-width: 768px) {
    .container {
      width: 320px;
      height: 499px;
      border: 3px solid hsl(0, 0%, 100%);
      border-radius: 20px;
      margin: 10% auto;
      background-color: hsl(0, 0%, 100%);
    }
    }

    /* Desktop styles (target 1440px and up) */
    @media (min-width: 1200px) {
    .container {
      width: 320px;
      height: 499px;
      border: 3px solid hsl(0, 0%, 100%);
      border-radius: 20px;
      margin: 10% auto;
      background-color: hsl(0, 0%, 100%);
    }
    }

    .container {
      width: 320px;
      height: 499px;
      border: 3px solid hsl(0, 0%, 100%);
      border-radius: 20px;
      margin: 10% auto;
      background-color: hsl(0, 0%, 100%);
    }

    .qr-code-image {
      display: block;
      width: 288px;
      height: 288px;
      margin-left: auto; 
      margin-right: auto;
      padding: 16px 16px;
      border-radius: 28px;
    }


    .p-one {
      margin-top: 12px;
      font-weight: 700;
      font-size: 22px;
      color: hsl(218, 44%, 22%);
      text-align: center;
      line-height: 120%;
      margin-right: 16px;
      margin-left: 16px;
    }

    .p-two {
      margin-top: 8px;
      font-weight: 400;
      font-size: 15px;
      color: hsl(216, 15%, 48%);
      text-align: center;
      line-height: 140%;
      margin-right: 16px;
      margin-left: 16px;
      margin-bottom: 40px;
    }

    p {
      font-family: 'Outfit'
    }

  </style>
</head>
<body>
<div class="container">
  <img class="qr-code-image" src="images/image-qr-code.png"/>
  <div class="text-container">

    <p class="p-one">Improve your front-end skills by building projects</p>
    
    <p class="p-two">
      Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
    </p>
  </div>

</div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/4lphav01d">4lphav01d</a>.
  </div>
</body>
</html>
